services:
  # Flask API Service
  - type: web
    name: ganesh-donations-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: ganesh-donations-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      # ── Cloudinary — set values in Render Dashboard → Environment ──
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  # PostgreSQL Database
  - name: ganesh-donations-db
    plan: free
    databaseName: ganesh_donations
    user: ganesh_admin
